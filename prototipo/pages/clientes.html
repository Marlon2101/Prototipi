<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clientes - Sistema Ventas</title>
<link rel="stylesheet" href="../css/estilos.css">
</head>
<body>

<div class="contenedor">

    <nav class="menu" id="menu"></nav>

    <main class="contenido">

        <div class="encabezado">
            <h1>Clientes</h1>
            <span class="usuario-actual" id="usuarioActual"></span>
        </div>

        <div class="barra-acciones">
            <input type="text" id="buscador" placeholder="Buscar por nombre, correo o DNI">
            <button class="nuevo" id="btnNuevo">+ Nuevo Cliente</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>DNI</th>
                    <th>Correo</th>
                    <th>Teléfono</th>
                    <th>Dirección</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="tablaClientes">
                <tr><td colspan="7" class="vacio">Cargando...</td></tr>
            </tbody>
        </table>

    </main>
</div>

<div class="modal-fondo" id="modalCliente">
    <div class="modal">
        <h2 id="tituloModal">Nuevo Cliente</h2>

        <form id="formCliente">
            <input type="hidden" id="clienteId">

            <label>Nombre completo</label>
            <input type="text" id="nombre" required maxlength="80">

            <label>DNI / Documento</label>
            <input type="text" id="dni" required maxlength="20">

            <label>Correo</label>
            <input type="email" id="correo" required maxlength="80">

            <label>Teléfono</label>
            <input type="text" id="telefono" required maxlength="20">

            <label>Dirección</label>
            <input type="text" id="direccion" maxlength="120">

            <div class="modal-botones">
                <button type="button" class="secundario" onclick="UI.cerrarModal('modalCliente')">Cancelar</button>
                <button type="submit">Guardar</button>
            </div>
        </form>
    </div>
</div>

<script src="../js/data.js"></script>
<script src="../js/db.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/ui.js"></script>
<script src="../js/clientes.js"></script>

</body>
</html>
