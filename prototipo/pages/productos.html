<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Productos - Sistema Ventas</title>
<link rel="stylesheet" href="../css/estilos.css">
</head>
<body>

<div class="contenedor">

    <nav class="menu" id="menu"></nav>

    <main class="contenido">

        <div class="encabezado">
            <h1>Productos</h1>
            <span class="usuario-actual" id="usuarioActual"></span>
        </div>

        <div class="barra-acciones">
            <input type="text" id="buscador" placeholder="Buscar por nombre, código o categoría">
            <button class="nuevo" id="btnNuevo">+ Nuevo Producto</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Código</th>
                    <th>Producto</th>
                    <th>Categoría</th>
                    <th>Precio</th>
                    <th>Stock</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="tablaProductos">
                <tr><td colspan="7" class="vacio">Cargando...</td></tr>
            </tbody>
        </table>

    </main>
</div>

<!-- Modal para crear / editar producto -->
<div class="modal-fondo" id="modalProducto">
    <div class="modal">
        <h2 id="tituloModal">Nuevo Producto</h2>

        <form id="formProducto">
            <input type="hidden" id="productoId">

            <label>Código</label>
            <input type="text" id="codigo" required maxlength="20">

            <label>Nombre</label>
            <input type="text" id="nombre" required maxlength="80">

            <label>Categoría</label>
            <input type="text" id="categoria" required maxlength="40">

            <label>Precio</label>
            <input type="number" id="precio" required min="0" step="0.01">

            <label>Stock</label>
            <input type="number" id="stock" required min="0" step="1">

            <div class="modal-botones">
                <button type="button" class="secundario" onclick="UI.cerrarModal('modalProducto')">Cancelar</button>
                <button type="submit">Guardar</button>
            </div>
        </form>
    </div>
</div>

<script src="../js/data.js"></script>
<script src="../js/db.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/ui.js"></script>
<script src="../js/productos.js"></script>

</body>
</html>
