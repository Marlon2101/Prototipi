<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iniciar Sesión - Sistema Ventas</title>
<link rel="stylesheet" href="../css/estilos.css">
</head>
<body class="login-body">

<div class="login-box">
    <h1>Iniciar Sesión</h1>
    <p>Accede al panel del sistema de ventas.</p>

    <form id="formLogin">
        <input type="email" id="correo" placeholder="Correo electrónico" required autocomplete="username">
        <input type="password" id="password" placeholder="Contraseña" required autocomplete="current-password">
        <button type="submit">Ingresar</button>
    </form>

    <a href="recuperar.html" class="small-link">¿Olvidaste tu contraseña?</a>

    <!-- Credenciales de prueba visibles solo en el prototipo. Se eliminan al conectar la BD real. -->
    <p style="margin-top:20px; font-size:12px; color:#94a3b8;">
        Prueba: admin@sistema.com / admin123
    </p>
</div>

<script src="../js/data.js"></script>
<script src="../js/db.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/ui.js"></script>
<script>
    Auth.redirigirSiLogueado();

    document.getElementById('formLogin').addEventListener('submit', async (e) => {
        e.preventDefault();
        const correo = document.getElementById('correo').value.trim();
        const password = document.getElementById('password').value;

        const usuario = await Auth.iniciarSesion(correo, password);
        if(usuario){
            UI.notificar(`Bienvenido, ${usuario.nombre}`, 'exito');
            setTimeout(() => window.location.href = 'dashboard.html', 500);
        }else{
            UI.notificar('Credenciales incorrectas', 'error');
        }
    });
</script>

</body>
</html>
